<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="./aceLogo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <title>aceHRM</title>
</head>
<style>
  bp-webchat {
    --bp-brand-color: #2563eb;
    --bp-z-index: 9999;
  }

  bp-toggle-chat::part(button) {
    position: fixed !important;
    bottom: 20px !important;
    right: 20px !important;

    width: 65px !important;
    height: 65px !important;

    border-radius: 50% !important;
    border: none !important;

    background:
      linear-gradient(135deg, #111827, #2563eb) !important;

    box-shadow:
      0 10px 25px rgba(0, 0, 0, 0.25),
      0 0 20px rgba(37, 99, 235, 0.35) !important;

    transition: all 0.3s ease !important;
  }

  bp-toggle-chat::part(button):hover {
    transform: scale(1.08);
    box-shadow:
      0 14px 35px rgba(0, 0, 0, 0.35),
      0 0 30px rgba(37, 99, 235, 0.5) !important;
  }

  /* Hide default icon */
  bp-toggle-chat::part(icon) {
    display: none !important;
  }

  /* Custom image/icon */
  bp-toggle-chat::part(button)::before {
    content: "";

    width: 32px;
    height: 32px;

    background-image: url('./aceLogo.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;

    display: block;
    margin: auto;
  }
</style>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>



  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
  <script src="https://files.bpcontent.cloud/2026/05/19/12/20260519121230-D1DCL4MM.js" defer></script>
</body>

</html>
